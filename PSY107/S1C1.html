<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Science of Psychology - Interactive Flashcards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .controls { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .set-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .set-btn { padding: 11px; border: 2px solid #667eea; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 0.88em; }
        .set-btn:hover { background: #f5f5ff; transform: translateY(-2px); }
        .set-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .options { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .option-btn { padding: 10px 18px; border: none; background: #667eea; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .option-btn:hover { background: #764ba2; transform: translateY(-2px); }
        .progress-bar { background: #e0e0e0; border-radius: 10px; height: 20px; overflow: hidden; margin-top: 15px; }
        .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8em; font-weight: bold; }
        .stats { display: flex; justify-content: space-around; margin-top: 15px; padding-top: 15px; border-top: 2px solid #e0e0e0; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 0.9em; color: #666; margin-top: 5px; }
        .card-container { perspective: 1000px; margin-bottom: 20px; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        .flashcard { background: white; border-radius: 15px; padding: 40px; min-height: 340px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: transform 0.6s; transform-style: preserve-3d; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; position: absolute; width: 100%; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .card-back { transform: rotateY(180deg); }
        .card-label { position: absolute; top: 20px; left: 20px; background: #667eea; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; font-weight: 600; }
        .card-number { position: absolute; top: 20px; right: 20px; background: #764ba2; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; font-weight: 600; }
        .card-content { font-size: 1.25em; line-height: 1.6; color: #333; margin-top: 40px; }
        .card-hint { position: absolute; bottom: 20px; color: #aaa; font-size: 0.85em; font-style: italic; }
        .navigation { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .nav-btn { padding: 14px 26px; border: none; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .nav-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .prev-btn { background: #6c757d; color: white; }
        .next-btn { background: #28a745; color: white; }
        .know-btn { background: #28a745; color: white; }
        .review-btn { background: #ffc107; color: #333; }
        .completion-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .completion-modal.show { display: flex; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 480px; }
        .modal-content h2 { color: #667eea; font-size: 2em; margin-bottom: 20px; }
        .modal-btn { padding: 14px 26px; border: none; background: #667eea; color: white; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; margin: 5px; }
        .modal-btn:hover { background: #764ba2; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔬 Science of Psychology</h1>
        <p>Interactive Flashcards — 100 Cards Total</p>
    </div>
    <div class="controls">
        <h3 style="margin-bottom:15px; color:#667eea;">Select Card Set:</h3>
        <div class="set-selector">
            <button class="set-btn active" onclick="selectSet('all')">All Cards (100)</button>
            <button class="set-btn" onclick="selectSet(1)">Basics & Goals (12)</button>
            <button class="set-btn" onclick="selectSet(2)">Research Methods (15)</button>
            <button class="set-btn" onclick="selectSet(3)">Correlation (10)</button>
            <button class="set-btn" onclick="selectSet(4)">Experiments (18)</button>
            <button class="set-btn" onclick="selectSet(5)">Ethics (10)</button>
            <button class="set-btn" onclick="selectSet(6)">Perspectives (24)</button>
            <button class="set-btn" onclick="selectSet(7)">History (8)</button>
            <button class="set-btn" onclick="selectSet(8)">Comparisons (3)</button>
        </div>
        <div class="options">
            <button class="option-btn" onclick="shuffleCards()">🔀 Shuffle</button>
            <button class="option-btn" onclick="resetProgress()">🔄 Reset</button>
            <button class="option-btn" onclick="reviewMarked()">⭐ Review Marked</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressBar">0%</div></div>
        <div class="stats">
            <div class="stat"><div class="stat-value" id="currentCard">1</div><div class="stat-label">Current</div></div>
            <div class="stat"><div class="stat-value" id="totalCards">100</div><div class="stat-label">Total</div></div>
            <div class="stat"><div class="stat-value" id="knownCards">0</div><div class="stat-label">Known</div></div>
            <div class="stat"><div class="stat-value" id="markedCards">0</div><div class="stat-label">Review</div></div>
        </div>
    </div>
    <div class="card-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="card-label">QUESTION</div>
                <div class="card-number" id="cardNumber">1/100</div>
                <div class="card-content" id="frontContent">Click to start!</div>
                <div class="card-hint">Click card to flip</div>
            </div>
            <div class="card-face card-back">
                <div class="card-label">ANSWER</div>
                <div class="card-number" id="cardNumberBack">1/100</div>
                <div class="card-content" id="backContent">Answer appears here</div>
                <div class="card-hint">Click card to flip back</div>
            </div>
        </div>
    </div>
    <div class="navigation">
        <button class="nav-btn prev-btn" onclick="previousCard()" id="prevBtn">⬅️ Previous</button>
        <button class="nav-btn review-btn" onclick="markForReview()">⭐ Mark Review</button>
        <button class="nav-btn know-btn" onclick="markKnown()">✅ I Know This</button>
        <button class="nav-btn next-btn" onclick="nextCard()" id="nextBtn">Next ➡️</button>
    </div>
</div>
<div class="completion-modal" id="completionModal">
    <div class="modal-content">
        <h2>🎉 Set Complete!</h2>
        <p>Great work reviewing these cards!</p>
        <div id="completionStats"></div>
        <button class="modal-btn" onclick="resetAndContinue()">Start Over</button>
        <button class="modal-btn" onclick="closeModal()">Close</button>
    </div>
</div>
<script>
const flashcards = [
    // SET 1: BASICS & GOALS (12)
    {set:1, front:"What is psychology?", back:"The scientific study of behavior and mental processes."},
    {set:1, front:"What does it mean to 'think like a psychologist'?", back:"Be SKEPTICAL about explanations of behavior rather than simply accepting them."},
    {set:1, front:"What are the four goals of psychology?", back:"Describe, Predict, Explain, Control/Change behavior. Mnemonic: DPEC."},
    {set:1, front:"What does 'describe' mean as a goal?", back:"Observe and record what is happening with behavior."},
    {set:1, front:"What does 'predict' mean as a goal?", back:"Identify when behavior will happen; find relationships between variables."},
    {set:1, front:"What does 'explain' mean as a goal?", back:"Understand why behavior happens; identify causes and mechanisms."},
    {set:1, front:"What does 'control/change' mean as a goal?", back:"Apply knowledge to influence or modify behavior (make it happen or stop it)."},
    {set:1, front:"Psychology is NOT simply...", back:"Giving advice. Psychology is a SCIENCE, not just counseling."},
    {set:1, front:"Psychology is NOT just...", back:"Common sense. Scientific findings often CONTRADICT common sense."},
    {set:1, front:"Psychology is NOT limited to...", back:"Mental health disorders. Studies ALL aspects of behavior and cognition."},
    {set:1, front:"What is a hypothesis?", back:"A testable prediction about behavior."},
    {set:1, front:"What is a variable?", back:"Any factor that can change or vary."},

    // SET 2: RESEARCH METHODS (15)
    {set:2, front:"What is naturalistic observation?", back:"Observing behavior in natural setting without interference. Can only DESCRIBE behavior."},
    {set:2, front:"What is a case study?", back:"In-depth study of one individual or small group. Rich detail but can't generalize."},
    {set:2, front:"What is a survey?", back:"Questionnaires or interviews with many participants. Fast data collection but has self-report bias."},
    {set:2, front:"What is a correlational study?", back:"Measures relationship between two variables. Can PREDICT but CANNOT establish causation."},
    {set:2, front:"What is an experiment?", back:"Manipulates IV to test effect on DV with random assignment. ONLY method that can establish CAUSATION."},
    {set:2, front:"What is a quasi-experiment?", back:"Like experiment but NO random assignment. Suggests but doesn't prove causation."},
    {set:2, front:"Which research method can establish causation?", back:"ONLY experiments (with random assignment and IV manipulation)."},
    {set:2, front:"What can naturalistic observation establish?", back:"Description only (not prediction or causation)."},
    {set:2, front:"What can case studies establish?", back:"Description only (can't generalize to others)."},
    {set:2, front:"What can surveys establish?", back:"Description and prediction (correlation), but NOT causation."},
    {set:2, front:"What can correlational studies establish?", back:"Prediction (correlation) but NOT causation."},
    {set:2, front:"What can experiments establish?", back:"CAUSATION — the only method that can prove one variable causes changes in another."},
    {set:2, front:"What is a predictive hypothesis?", back:"Predicts a relationship between variables (correlation). Tested by observational/correlational methods."},
    {set:2, front:"What is a causal hypothesis?", back:"Predicts one variable CAUSES change in another. Tested ONLY by experiments."},
    {set:2, front:"Name the 6 main research methods.", back:"Naturalistic observation, case study, survey, correlational study, experiment, quasi-experiment."},

    // SET 3: CORRELATION (10)
    {set:3, front:"What does 'correlation does not equal causation' mean?", back:"Just because two variables are related doesn't mean one causes the other. Could be reverse or third variable."},
    {set:3, front:"What are the three possible explanations for any correlation?", back:"1) A causes B, 2) B causes A (reverse), 3) Third variable C causes both A and B."},
    {set:3, front:"What is a positive correlation?", back:"Both variables increase together (e.g., study time and grades both go up)."},
    {set:3, front:"What is a negative correlation?", back:"As one variable increases, the other decreases (e.g., absences increase, grades decrease)."},
    {set:3, front:"What is zero correlation?", back:"No relationship between variables (e.g., shoe size and intelligence)."},
    {set:3, front:"What is a correlation coefficient?", back:"A number from −1.00 to +1.00 showing strength and direction of relationship."},
    {set:3, front:"Example: Ice cream sales correlate with drowning. Does ice cream cause drowning?", back:"No. Third variable (hot weather) causes BOTH more ice cream sales AND more swimming (drowning risk)."},
    {set:3, front:"Why can't correlational studies prove causation?", back:"Can't rule out reverse direction or third variable problem. Only experiments control these issues."},
    {set:3, front:"What must you do to prove causation?", back:"Conduct an experiment with: random assignment, IV manipulation, control group, measure DV."},
    {set:3, front:"If study finds correlation between exercise and mood, what do we know?", back:"They're related/can predict, but we DON'T know if exercise causes better mood (could be reverse or third variable)."},

    // SET 4: EXPERIMENTS (18)
    {set:4, front:"What is the independent variable (IV)?", back:"Variable the experimenter MANIPULATES; the presumed CAUSE. What you change or assign."},
    {set:4, front:"What is the dependent variable (DV)?", back:"Variable the experimenter MEASURES; the presumed EFFECT. What you observe or record."},
    {set:4, front:"What is the experimental group?", back:"Group that RECEIVES the treatment/manipulation (exposed to IV)."},
    {set:4, front:"What is the control group?", back:"Group that does NOT receive treatment; provides baseline for comparison. May receive placebo."},
    {set:4, front:"What is random assignment?", back:"Randomly placing participants into experimental or control groups. Ensures groups equivalent at start."},
    {set:4, front:"What is random sampling?", back:"Randomly selecting participants from population. Ensures sample represents population."},
    {set:4, front:"What's the difference between random assignment and random sampling?", back:"Assignment = placing into groups (for causation). Sampling = selecting participants (for generalization)."},
    {set:4, front:"Why is random assignment critical?", back:"Controls for confounding variables, ensures groups equivalent, allows us to establish CAUSATION."},
    {set:4, front:"Why is random sampling important?", back:"Ensures sample represents population, allows us to GENERALIZE findings."},
    {set:4, front:"What is a confounding variable?", back:"Unwanted factor that affects results and makes it hard to determine what caused the effect."},
    {set:4, front:"What is a population?", back:"The entire group of interest that researchers want to study."},
    {set:4, front:"What is a sample?", back:"A subset of the population that is actually studied."},
    {set:4, front:"Example: Test if caffeine improves memory. What's the IV?", back:"Caffeine (presence/absence or amount) — what you MANIPULATE."},
    {set:4, front:"Example: Test if caffeine improves memory. What's the DV?", back:"Memory test score — what you MEASURE."},
    {set:4, front:"Example: Test if caffeine improves memory. What's experimental group?", back:"Group that receives caffeine."},
    {set:4, front:"Example: Test if caffeine improves memory. What's control group?", back:"Group that receives NO caffeine (or placebo)."},
    {set:4, front:"DRY MIX mnemonic means?", back:"DRY = Dependent, Responding, Y-axis. MIX = Manipulated, Independent, X-axis."},
    {set:4, front:"Why can't quasi-experiments establish causation?", back:"No random assignment, so can't be sure groups were equivalent at start. Could be pre-existing differences."},

    // SET 5: ETHICS (10)
    {set:5, front:"What is informed consent?", back:"Telling participants about study procedures and risks; they must agree voluntarily before participating."},
    {set:5, front:"What is confidentiality?", back:"Keeping participant data private; use ID numbers not names, secure storage."},
    {set:5, front:"What is protection from harm?", back:"Minimizing physical and psychological risks; benefits must outweigh risks."},
    {set:5, front:"When is deception allowed in research?", back:"Only if necessary with no alternative, doesn't cause harm, and researchers debrief afterward."},
    {set:5, front:"What is debriefing?", back:"Explaining study purpose after completion, revealing any deception, answering questions, ensuring participants OK."},
    {set:5, front:"What are the 5 key ethical principles?", back:"Informed consent, Confidentiality, Protection from harm, Deception (minimal), Debriefing. Mnemonic: ICP-DD."},
    {set:5, front:"Can participants withdraw from a study?", back:"Yes, at any time without penalty. Participation is always voluntary."},
    {set:5, front:"Who created ethical guidelines for psychology?", back:"American Psychological Association (APA)."},
    {set:5, front:"What ethical principles apply to animal research?", back:"Humane treatment, minimize pain/suffering, proper housing, justify scientific necessity."},
    {set:5, front:"Why is debriefing important?", back:"Explains purpose, reveals deception, answers questions, ensures no lasting harm, educates participants."},

    // SET 6: PERSPECTIVES (24)
    {set:6, front:"What is the neuroscience/biological perspective?", back:"Focus: Brain, nervous system, genetics, hormones. How biological processes influence behavior."},
    {set:6, front:"What is the evolutionary perspective?", back:"Focus: Behaviors that helped ancestors survive and reproduce. How did this help survival?"},
    {set:6, front:"What is the psychodynamic perspective?", back:"Focus: Unconscious processes, childhood experiences, internal conflicts. What unconscious motives drive behavior?"},
    {set:6, front:"What is the behavioral perspective?", back:"Focus: Observable behavior, environmental influences, learning. What external factors shaped behavior?"},
    {set:6, front:"What is the cognitive perspective?", back:"Focus: Mental processes, thinking, memory, decision-making. How do thoughts influence behavior?"},
    {set:6, front:"What is the sociocultural perspective?", back:"Focus: Culture, ethnicity, gender, social class. How does social context shape behavior?"},
    {set:6, front:"What is the humanistic perspective?", back:"Focus: Free will, personal growth, self-actualization, choice. How can people reach full potential?"},
    {set:6, front:"What is the eclectic approach?", back:"Integrating multiple perspectives. Modern standard — no single perspective explains everything."},
    {set:6, front:"Which perspective focuses on brain and genetics?", back:"Neuroscience/Biological perspective."},
    {set:6, front:"Which perspective focuses on unconscious mind?", back:"Psychodynamic perspective (from Freud)."},
    {set:6, front:"Which perspective focuses on learning and environment?", back:"Behavioral perspective (Watson, Skinner)."},
    {set:6, front:"Which perspective focuses on thinking and mental processes?", back:"Cognitive perspective."},
    {set:6, front:"Which perspective focuses on free will and choice?", back:"Humanistic perspective (Rogers, Maslow)."},
    {set:6, front:"Which perspective focuses on cultural context?", back:"Sociocultural perspective."},
    {set:6, front:"Which perspective focuses on adaptive survival behaviors?", back:"Evolutionary perspective."},
    {set:6, front:"Example: Depression explained by neurotransmitters. Which perspective?", back:"Neuroscience/Biological perspective."},
    {set:6, front:"Example: Depression explained by negative thinking. Which perspective?", back:"Cognitive perspective."},
    {set:6, front:"Example: Depression explained by lack of reinforcing activities. Which perspective?", back:"Behavioral perspective."},
    {set:6, front:"Example: Depression explained by unconscious childhood conflicts. Which perspective?", back:"Psychodynamic perspective."},
    {set:6, front:"Example: Fear of snakes as adaptive for survival. Which perspective?", back:"Evolutionary perspective."},
    {set:6, front:"Mnemonic for 8 perspectives?", back:"NEBCSHPE: Neuroscience, Evolutionary, Behavioral, Cognitive, Sociocultural, Humanistic, Psychodynamic, Eclectic."},
    {set:6, front:"Mnemonic sentence for perspectives?", back:"'New Elephants Behave Cautiously; Some Have Purple Ears'"},
    {set:6, front:"What do most modern psychologists use?", back:"Eclectic approach — integrating multiple perspectives rather than just one."},
    {set:6, front:"What is positive psychology related to?", back:"Cognitive perspective — focuses on happiness, well-being, positive emotions, strengths."},

    // SET 7: HISTORY (8)
    {set:7, front:"Who is the 'father of psychology' and what did he do?", back:"Wilhelm Wundt. Established first psychology lab in 1879 in Germany. Birth of psychology as science."},
    {set:7, front:"What is functionalism and who promoted it?", back:"William James. Focus on how behavior helps people adapt to environment (function of behavior)."},
    {set:7, front:"What is psychoanalysis and who developed it?", back:"Sigmund Freud. Focus on unconscious mind, childhood experiences, dreams, defense mechanisms."},
    {set:7, front:"What is behaviorism and who were the key figures?", back:"John B. Watson and B.F. Skinner. Study only observable behavior; ignore mental processes."},
    {set:7, front:"What did Watson emphasize?", back:"Observable behavior only; environmental influences; rejected introspection and mental processes."},
    {set:7, front:"What did Skinner study?", back:"Operant conditioning — how rewards and punishments shape behavior."},
    {set:7, front:"When was psychology established as a science?", back:"1879 when Wilhelm Wundt opened first psychology lab."},
    {set:7, front:"Historical timeline order?", back:"Wundt (1879) → James (functionalism) → Freud (psychoanalysis) → Watson/Skinner (behaviorism) → Cognitive revolution → Today (eclectic)."},

    // SET 8: COMPARISONS (3)
    {set:8, front:"Correlation vs. Causation?", back:"Correlation = variables related (can predict). Causation = one variable causes change in another (only experiments)."},
    {set:8, front:"IV vs. DV?", back:"IV = Independent Variable (manipulated, cause). DV = Dependent Variable (measured, effect). DRY MIX."},
    {set:8, front:"Random Assignment vs. Random Sampling?", back:"Assignment = placing into groups (for causation). Sampling = selecting participants (for generalization)."}
];

let currentIndex = 0, isFlipped = false;
let activeCards = [...flashcards];
let knownCards = new Set(), markedCards = new Set();

function selectSet(setNumber) {
    document.querySelectorAll('.set-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    activeCards = setNumber === 'all' ? [...flashcards] : flashcards.filter(c => c.set === setNumber);
    currentIndex = 0; isFlipped = false;
    updateCard(); updateStats();
}
function shuffleCards() {
    for (let i = activeCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [activeCards[i], activeCards[j]] = [activeCards[j], activeCards[i]];
    }
    currentIndex = 0; isFlipped = false; updateCard();
}
function flipCard() {
    document.getElementById('flashcard').classList.toggle('flipped');
    isFlipped = !isFlipped;
}
function nextCard() {
    if (currentIndex < activeCards.length - 1) { currentIndex++; if (isFlipped) flipCard(); updateCard(); }
    else showCompletionModal();
}
function previousCard() {
    if (currentIndex > 0) { currentIndex--; if (isFlipped) flipCard(); updateCard(); }
}
function markKnown() { knownCards.add(currentIndex); updateStats(); nextCard(); }
function markForReview() {
    if (markedCards.has(currentIndex)) markedCards.delete(currentIndex);
    else markedCards.add(currentIndex);
    updateStats();
}
function reviewMarked() {
    if (markedCards.size === 0) { alert('No cards marked for review!'); return; }
    activeCards = flashcards.filter((_, i) => markedCards.has(i));
    currentIndex = 0; isFlipped = false; updateCard(); updateStats();
}
function resetProgress() {
    if (confirm('Reset all progress?')) { knownCards.clear(); markedCards.clear(); updateStats(); }
}
function updateCard() {
    const card = activeCards[currentIndex];
    document.getElementById('frontContent').textContent = card.front;
    document.getElementById('backContent').textContent = card.back;
    document.getElementById('cardNumber').textContent = `${currentIndex + 1}/${activeCards.length}`;
    document.getElementById('cardNumberBack').textContent = `${currentIndex + 1}/${activeCards.length}`;
    document.getElementById('currentCard').textContent = currentIndex + 1;
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === activeCards.length - 1;
    updateStats();
}
function updateStats() {
    const progress = ((currentIndex + 1) / activeCards.length) * 100;
    document.getElementById('progressBar').style.width = `${progress}%`;
    document.getElementById('progressBar').textContent = `${Math.round(progress)}%`;
    document.getElementById('totalCards').textContent = activeCards.length;
    document.getElementById('knownCards').textContent = knownCards.size;
    document.getElementById('markedCards').textContent = markedCards.size;
}
function showCompletionModal() {
    document.getElementById('completionStats').innerHTML = `<p><strong>Known:</strong> ${knownCards.size} | <strong>Review:</strong> ${markedCards.size}</p>`;
    document.getElementById('completionModal').classList.add('show');
}
function closeModal() { document.getElementById('completionModal').classList.remove('show'); }
function resetAndContinue() { currentIndex = 0; isFlipped = false; closeModal(); updateCard(); }
updateCard();
</script>
</body>
</html>
